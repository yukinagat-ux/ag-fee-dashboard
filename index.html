<style>
:root{
  --bg:#181818;--bg2:#1e1e1e;--bg3:#252525;--bg4:#2d2d2d;
  --text:#e4e4e4;--text2:#a0a0a0;--text3:#555;
  --border:#2e2e2e;--accent:#599CE7;

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;font-size:13px;line-height:1.6}
.page{max-width:1160px;margin:0 auto;padding:20px}
h2{font-size:13px;font-weight:600;margin:16px 0 6px}
h3{font-size:12px;font-weight:600;color:var(--text2);margin:0 0 5px}
.sub{font-size:11px;color:var(--text2)}
.dim{color:var(--text2)}

/* Header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px}
h1{font-size:18px;font-weight:600}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.badge{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid var(--border);color:var(--text2);display:inline-block}
.badge-info{border-color:#3a6fa8;color:#80b4e8;background:rgba(89,156,231,.1)}
.badge-warn{border-color:#8a6200;color:var(--yellow-text);background:var(--ybg)}

/* Q selector */
.q-row{display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.q-lbl{font-size:11px;color:var(--text2)}
.qbtn{padding:4px 14px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:12px}
.qbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.qbtn:disabled{opacity:.35;cursor:not-allowed}

/* Pills */
.pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.pg{background:var(--gbg);color:var(--green-text);border:1px solid rgba(77,191,140,.25)}
.py{background:var(--ybg);color:var(--yellow-text);border:1px solid rgba(224,176,64,.25)}
.pr{background:var(--rbg);color:var(--red-text);border:1px solid rgba(224,112,112,.25)}
.pb{background:rgba(89,156,231,.12);color:#80b4e8;border:1px solid rgba(89,156,231,.25)}
.pgr{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* Tabs */
.m-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);margin-bottom:18px;scrollbar-width:none}
.m-tabs::-webkit-scrollbar{display:none}
.mtab{padding:7px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab.summary-tab{font-weight:600}

/* KPI grid */
.kpis{display:grid;gap:10px;margin-bottom:14px}
.k4{grid-template-columns:repeat(4,1fr)}
.k3{grid-template-columns:repeat(3,1fr)}
.k2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 13px}
.kval{font-size:17px;font-weight:600}
.klbl{font-size:10px;color:var(--text2);margin-top:2px}
.green{color:var(--green-text)}
.yellow{color:var(--yellow-text)}
.red{color:var(--red-text)}

/* Health bar card */
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bar-bg{height:8px;background:var(--bg3);border-radius:4px;position:relative;overflow:visible;margin-bottom:3px}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-mark{position:absolute;top:-4px;width:2px;height:16px;background:var(--text3);border-radius:1px}
.bar-lbls{display:flex;justify-content:space-between;font-size:10px;color:var(--text2)}

/* Summary grid */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s}
.sum-card:hover{border-color:var(--accent)}
.sc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:6px}
.sc-title{font-size:12px;font-weight:600}
.sc-team{font-size:10px;color:var(--text2);margin-top:1px}
.sc-nums{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px}
.sc-num{font-size:10px;color:var(--text2)}
.sc-num b{display:block;font-size:13px;font-weight:600;color:var(--text)}
.sc-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:3px}

/* Sub-item table/cards */
.items-table{width:100%;border-collapse:collapse}
.items-table th{background:var(--bg3);color:var(--text2);font-size:10px;font-weight:500;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.items-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.items-table tr:last-child td{border-bottom:none}
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}

/* Progress bar inline */
.ibar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle}
.ibar-fill{height:100%;border-radius:3px}

/* Agency section */
.ag-section{margin-top:14px}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px}
.ag-tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
table.ag{width:100%;border-collapse:collapse;min-width:520px}
table.ag th{background:var(--bg3);color:var(--text2);font-size:10px;font-weight:500;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
table.ag td{padding:5px 8px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;white-space:nowrap}
table.ag tr:last-child td{border-bottom:none}
table.ag tr.rr td{background:rgba(184,48,48,.06)}
table.ag tr.ry td{background:rgba(184,144,10,.06)}

/* Filter bar */
.fbar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.fbtn{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:11px}
.fbtn.active{background:var(--bg3);color:var(--text);border-color:var(--text3)}

/* Callout */
.callout{padding:9px 13px;border-radius:6px;font-size:11px;margin-bottom:12px}
.ci{background:rgba(89,156,231,.1);border:1px solid rgba(89,156,231,.3);color:#80b4e8}
.cw{background:var(--ybg);border:1px solid rgba(184,144,10,.35);color:var(--yellow-text)}

.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px}
hr.div{border:none;border-top:1px solid var(--border);margin:14px 0}

@media(max-width:680px){
  .k4,.k3{grid-template-columns:repeat(2,1fr)}
  .charts-2{grid-template-columns:1fr}

// FORMATTERS
// ═══════════════════════════════════════════════════════════
function jpy(n, sign){
  if(n === null || n === undefined) return '—';
  const s = sign && n > 0 ? '+' : (sign && n < 0 ? '' : '');
  const a = Math.abs(n);
  if(a >= 1e8)  return s + (n/1e8).toFixed(2) + '億円';
  if(a >= 1e7)  return s + (n/1e7).toFixed(2) + '千万円';
  if(a >= 1e4)  return s + Math.round(n/1e4) + '万円';
  return s + '¥' + Math.round(n).toLocaleString();
}
function pct(n){ return n === null ? '—' : n.toFixed(1) + '%'; }
function ratio(est, bud){ return (est !== null && bud) ? est/bud : null; }
function hcls(r){ return r === null ? 'pgr' : r > 1 ? 'pr' : r > 0.9 ? 'py' : 'pg'; }
function hlbl(r){ return r === null ? '—' : r > 1 ? '超過' : r > 0.9 ? '注意' : '予算内'; }
function hclr(r){ return r === null ? '' : r > 1 ? 'red' : r > 0.9 ? 'yellow' : 'green'; }

// ═══════════════════════════════════════════════════════════
// COMPUTED TOTALS
// ═══════════════════════════════════════════════════════════
function catTotal(cat) {
  return {
    budget:   cat.items.reduce((s,x) => s + (x.budget||0), 0),
    estimate: cat.items.every(x => x.estimate === null) ? null
              : cat.items.reduce((s,x) => s + (x.estimate||0), 0)
  };
}

// ═══════════════════════════════════════════════════════════
// SHARED RENDERERS
// ═══════════════════════════════════════════════════════════
function stagePill(s){
  const m = {'未達':'pr','段階1':'pb','段階2':'pb','段階3':'pg'};
  return '<span class="pill ' + (m[s]||'pgr') + (s==='段階1'?' style="opacity:.75"':'') + '">' + s + '</span>';
}

function renderHCard(label, budget, estimate, note, container) {
  const r = ratio(estimate, budget);
  const fc = barColor(r);
  const max = Math.max(budget, estimate||0) * 1.12;
  const bfill = estimate !== null ? Math.min(estimate/max*100, 100) : 0;
  const bmark = Math.min(budget/max*100, 100);
  const surplus = estimate !== null ? budget - estimate : null;
  const surplusLabel = surplus !== null ? (surplus < 0 ? '予算超過' : '予算余り') : '—';
  container.innerHTML =
    '<div class="hcard">' +
      '<div class="hrow">' +
        '<span style="font-weight:600;font-size:12px">' + label + '</span>' +
        '<span class="pill ' + hcls(r) + '">' + hlbl(r) + '</span>' +
        '<span class="dim" style="font-size:11px;margin-left:auto">' + (note||'') + '</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 10px">' +
        '<div><div class="sub">Q1予算</div><div style="font-size:16px;font-weight:600">' + jpy(budget) + '</div></div>' +
        '<div><div class="sub">Q1見立て</div><div style="font-size:16px;font-weight:600;color:' + (r!==null?'var(--'+hclr(r)+'-text)':'var(--text2)') + '">' + jpy(estimate) + '</div></div>' +
        '<div><div class="sub">予算比</div><div style="font-size:16px;font-weight:600;color:' + (r!==null?'var(--'+hclr(r)+'-text)':'var(--text2)') + '">' + (r!==null?pct(r*100):'—') + '</div></div>' +
        '<div><div class="sub">' + surplusLabel + '</div><div style="font-size:16px;font-weight:600;color:' + (surplus!==null&&surplus<0?'var(--red-text)':'var(--green-text)') + '">' + (surplus!==null?jpy(Math.abs(surplus)):'—') + '</div></div>' +
      '</div>' +
      '<div class="bar-bg">' +
        '<div class="bar-fill" style="width:' + bfill + '%;background:' + fc + '"></div>' +
        '<div class="bar-mark" style="left:' + bmark + '%"></div>' +
      '</div>' +
      '<div class="bar-lbls"><span>▲予算 ' + jpy(budget) + '</span><span>' + (r!==null?pct(r*100):'') + '</span></div>' +
    '</div>';
}

function tierCounts(ags){
  return ['未達','段階1','段階2','段階3'].map(s => ags.filter(a => a.stage===s).length);
}

function buildSummary(){
  const allBudget = CATEGORIES.reduce((s,c) => s + catTotal(c).budget, 0);
  const knownEst  = CATEGORIES.reduce((s,c) => { const t=catTotal(c); return t.estimate!==null?s+t.estimate:s; }, 0);
  const knownBud  = CATEGORIES.reduce((s,c) => { const t=catTotal(c); return t.estimate!==null?s+catTotal(c).budget:s; }, 0);
  const r = knownEst / knownBud;

  const cards = CATEGORIES.map(function(cat){
    const t = catTotal(cat);
    const cr = ratio(t.estimate, t.budget);
    const fc = barColor(cr);
    const fill = cr !== null ? Math.min(cr*100, 100) : 0;
    return '<div class="sum-card" onclick="switchCat(\'' + cat.id + '\')">' +
      '<div class="sc-head">' +
        '<div><div class="sc-title">' + cat.nameShort + '</div><div class="sc-team">' + cat.team + '</div></div>' +
        '<span class="pill ' + hcls(cr) + '">' + hlbl(cr) + '</span>' +
      '</div>' +
      '<div class="sc-nums">' +
        '<div class="sc-num"><b>' + jpy(t.budget) + '</b>予算</div>' +
        '<div class="sc-num"><b style="color:' + (cr!==null?'var(--'+hclr(cr)+'-text)':'var(--text2)') + '">' + jpy(t.estimate) + '</b>見立て</div>' +
      '</div>' +
      (cr!==null ? '<div class="sub" style="margin-bottom:3px">予算比 ' + pct(cr*100) + '</div>' :
                   '<div class="sub" style="color:var(--text3);margin-bottom:3px">見立て未取得</div>') +
      '<div class="sc-bar"><div class="sc-bar-fill" style="width:' + fill + '%;background:' + fc + '"></div></div>' +
      '<div class="sub" style="margin-top:4px">' + cat.items.length + '項目</div>' +
    '</div>';
  }).join('');

  const allItemsRows = CATEGORIES.map(function(cat){
    return cat.items.map(function(item){
      const r2 = ratio(item.estimate, item.budget);
      const fill2 = r2 !== null ? Math.min(r2*100, 100) : 0;
      const fc2 = barColor(r2);
      return '<tr>' +
        '<td><span class="pill pgr" style="font-size:10px">' + cat.nameShort + '</span></td>' +
        '<td style="font-weight:500">' + item.name + '</td>' +
        '<td><span class="pill pgr" style="font-size:10px">' + cat.team + '</span></td>' +
        '<td style="text-align:right">' + jpy(item.budget) + '</td>' +
        '<td style="text-align:right;color:' + (r2!==null?'var(--'+hclr(r2)+'-text)':'var(--text2)') + ';font-weight:600">' + jpy(item.estimate) + '</td>' +
        '<td style="text-align:right"><span class="pill ' + hcls(r2) + '">' + (r2!==null?pct(r2*100):'—') + '</span></td>' +
        '<td><div class="ibar"><div class="ibar-fill" style="width:' + fill2 + '%;background:' + fc2 + '"></div></div></td>' +
        '<td class="dim" style="font-size:10px">' + (item.source||'') + '</td>' +
      '</tr>';
    }).join('');
  }).join('');

  document.getElementById('panel-summary').innerHTML =
    '<div class="kpis k4" style="margin-bottom:14px">' +
      '<div class="kpi"><div class="kval">' + jpy(allBudget) + '</div><div class="klbl">Q1 全体予算合計</div></div>' +
      '<div class="kpi"><div class="kval ' + hclr(r) + '">' + jpy(knownEst) + '</div><div class="klbl">Q1 見立て合計（判明分）</div></div>' +
      '<div class="kpi"><div class="kval ' + hclr(r) + '">' + pct(r*100) + '</div><div class="klbl">予算比（見立て判明分のみ）</div></div>' +
      '<div class="kpi"><div class="kval dim">6カテゴリ / ' + CATEGORIES.reduce((s,c)=>s+c.items.length,0) + '項目</div><div class="klbl">構成</div></div>' +
    '</div>' +
    '<div class="callout ci">カードをクリックすると各カテゴリ詳細へジャンプ。業績インセン（NG）のGIB・従量はQ1見立て未取得（別シート要確認）。</div>' +
    '<span class="sec-lbl">カテゴリ別サマリー</span>' +
    '<div class="sum-grid">' + cards + '</div>' +
    '<span class="sec-lbl">全項目一覧</span>' +
    '<div class="tbl-wrap"><table class="items-table">' +
      '<thead><tr><th>カテゴリ</th><th>項目名</th><th>Team</th><th>Q1予算</th><th>Q1見立て</th><th>予算比</th><th>進捗</th><th>データソース</th></tr></thead>' +
      '<tbody>' + allItemsRows + '</tbody>' +
    '</table></div>';
}

                '<td><span class="pill '+(a.type==='SP'?'pb':'pgr')+'">'+a.type+'</span></td>' +
                '<td style="text-align:right;color:'+(a.lr>=100?'var(--green-text)':'var(--red-text)')+';font-weight:600">'+pct(a.lr)+'</td>' +
                '<td>'+stagePill(a.stage)+'</td>' +
                '<td class="dim">'+a.rl+'</td>' +
                '<td style="text-align:right">'+(a.inc>0?'<b>'+jpy(a.inc)+'</b>':'<span class="pill pr">なし</span>')+'</td>' +
              '</tr>';
            }).join('') +
          '</tbody></table></div>';
    }
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px">' +
        '<span style="font-weight:600;font-size:12px">'+item.name+'</span>' +
        '<span class="pill '+hcls(r2)+'">'+hlbl(r2)+'</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">' +
        '<div class="sub">予算<br><b style="font-size:13px;color:var(--text)">'+jpy(item.budget)+'</b></div>' +
        '<div class="sub">見立て<br><b style="font-size:13px;color:var(--'+(r2!==null?hclr(r2)+'-text':'text2')+')">'+jpy(item.estimate)+'</b></div>' +
        '<div class="sub">予算比<br><b style="font-size:13px;color:var(--'+(r2!==null?hclr(r2)+'-text':'text2')+')">'+pct(r2!==null?r2*100:null)+'</b></div>' +
        '<div class="sub">ソース<br><b style="font-size:11px;color:var(--text2)">'+item.source+'</b></div>' +
      '</div>' +
      '<div class="bar-bg" style="height:6px">' +
        '<div class="bar-fill" style="width:'+fill2+'%;background:'+fc2+'"></div>' +
      '</div>' +
      '<div class="sub" style="margin-top:4px">'+item.note+'</div>' +
      detail +
    '</div>';
  }).join('');

  el.innerHTML = '<div id="kojin-hcard"></div>' + itemCards;
  renderHCard(cat.nameShort, t.budget, t.estimate, 'PO管理', document.getElementById('kojin-hcard'));

  if(_sppCharts.sp) _sppCharts.sp.destroy();
  if(_sppCharts.pp) _sppCharts.pp.destroy();
  const mk = function(id,data){
    const ctx = document.getElementById(id);
    if(!ctx) return;
    return new Chart(ctx.getContext('2d'),{type:'doughnut',data:{
      labels:['未達','段階1','段階2','段階3'],
      datasets:[{data:data,backgroundColor:['rgba(184,48,48,.7)','rgba(89,156,231,.5)','rgba(89,156,231,.75)','rgba(31,138,101,.75)'],borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{labels:{color:'#aaa',font:{size:11}},position:'bottom'},
        tooltip:{callbacks:{label:function(c){return c.label+': '+c.raw+'社';}}}}}});
  };
  _sppCharts.sp = mk('spp-spTier', spTc);
  _sppCharts.pp = mk('spp-ppTier', ppTc);
}

      '<div class="sub">'+item.note+'</div>' +

    itemCards;

  const rng = document.createElement('div');
  rng.innerHTML =

      '<div class="hrow"><span style="font-weight:600;font-size:12px">' + cat.nameShort + '</span><span class="pill pgr">見立て未取得</span>' +
      '<span class="dim" style="font-size:11px;margin-left:auto">NG管理</span></div>' +
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px">' +
        '<div><div class="sub">Q1予算</div><div style="font-size:16px;font-weight:600">' + jpy(t.budget) + '</div></div>' +
        '<div><div class="sub">Q1見立て</div><div style="font-size:16px;font-weight:600;color:var(--text2)">—</div></div>' +
      '</div>' +
    '</div>';
  document.getElementById('ng-hcard').replaceWith(rng.firstChild);
}

// SIMPLE TAB BUILDER (支援金, BNP, WB)
// ═══════════════════════════════════════════════════════════
function buildSimpleCat(catId){
  const cat = CATEGORIES.find(c => c.id === catId);
  const t = catTotal(cat);
  const el = document.getElementById('panel-' + catId);

  const itemRows = cat.items.map(function(item){
    const r2 = ratio(item.estimate, item.budget);
    return '<tr>' +
      '<td style="font-weight:500">'+item.name+'</td>' +
      '<td style="text-align:right">'+jpy(item.budget)+'</td>' +
      '<td style="text-align:right;color:var(--green-text);font-weight:600">'+jpy(item.estimate)+'</td>' +
      '<td><span class="pill '+hcls(r2)+'">'+hlbl(r2)+'</span></td>' +
      '<td class="dim">'+item.note+'</td>' +
      '<td class="dim" style="font-size:10px">'+item.source+'</td>' +
    '</tr>';
  }).join('');

  el.innerHTML =
    '<div id="'+catId+'-hcard"></div>' +
    '<div class="tbl-wrap"><table class="items-table">' +
      '<thead><tr><th>項目</th><th>予算</th><th>見立て</th><th>状態</th><th>概要</th><th>ソース</th></tr></thead>' +
      '<tbody>' + itemRows + '</tbody>' +
    '</table></div>';

  renderHCard(cat.nameShort, t.budget, t.estimate, cat.team+'管理', document.getElementById(catId+'-hcard'));
}

// ═══════════════════════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════════════════════
const TAB_DEFS = [
  { id:'summary',      label:'📊 全体サマリー', build:buildSummary },
  { id:'gyoseki_mc',   label:'業績インセン（MC）', build:buildGyosekiMC },
  { id:'kojin_mc',     label:'個社インセン（MC）', build:buildKojinMC },
  { id:'gyoseki_ng',   label:'業績インセン（NG）', build:buildGyosekiNG },
  { id:'shien',        label:'支援金', build:function(){ buildSimpleCat('shien'); } },
  { id:'bnp',          label:'BNP',  build:function(){ buildSimpleCat('bnp'); } },
  { id:'wb',           label:'WB',   build:function(){ buildSimpleCat('wb'); } },
];
const _built = new Set();

function switchCat(id){
  TAB_DEFS.forEach(function(t){
    const el = document.getElementById('panel-'+t.id);
    if(el) el.style.display = t.id===id ? '' : 'none';
  });
  document.querySelectorAll('.mtab').forEach(function(b){
    b.classList.toggle('active', b.dataset.id===id);
  });
  if(!_built.has(id)){
    _built.add(id);
    TAB_DEFS.find(function(t){ return t.id===id; }).build();
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

// Build tab bar
document.getElementById('catTabs').innerHTML = TAB_DEFS.map(function(t,i){
  return '<button class="mtab'+(i===0?' summary-tab':'')+'" data-id="'+t.id+'" onclick="switchCat(\''+t.id+'\')">'+t.label+'</button>';
}).join('');

// Init
switchCat('summary');
</script>
